<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-form">
        <h2>নতুন অ্যাকাউন্ট (Signup)</h2>
        <form onsubmit="signup(event)">
            <input type="text" id="user" placeholder="আপনার নাম/ইউজারনেম" required>
            <input type="password" id="pass" placeholder="পাসওয়ার্ড" required>
            <button type="submit" class="btn">Register</button>
        </form>
        <p style="margin-top:10px;">অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a></p>
    </div>
    <script src="auth.js"></script>
</body>
</html>
