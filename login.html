<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-form">
        <h2>লগইন (Login)</h2>
        <form onsubmit="login(event)">
            <input type="text" id="user" placeholder="ইউজারনেম" required>
            <input type="password" id="pass" placeholder="পাসওয়ার্ড" required>
            <button type="submit" class="btn">Login</button>
        </form>
        <p style="margin-top:10px;">নতুন ইউজার? <a href="signup.html">অ্যাকাউন্ট খুলুন</a></p>
    </div>
    <script src="auth.js"></script>
</body>
</html>
